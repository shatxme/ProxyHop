name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./extension/manifest.json').version")"
          if [[ "$TAG_VERSION" != "$MANIFEST_VERSION" ]]; then
            printf 'Tag version %s does not match manifest version %s\n' "$TAG_VERSION" "$MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate extension scripts
        run: npm run check

      - name: Package extension
        run: npm run build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ProxyHop ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.zip
          fail_on_unmatched_files: true
